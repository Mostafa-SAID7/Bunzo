<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Bunzo - Modern Recipe Platform | Discover Amazing Recipes</title>
    <meta name="title" content="Bunzo - Modern Recipe Platform | Discover Amazing Recipes" />
    <meta name="description" content="Discover, share, and create amazing recipes with Bunzo. A modern food recipe platform built with React, featuring beautiful imagery, detailed instructions, and a vibrant cooking community." />
    <meta name="keywords" content="recipes, cooking, food, blog, culinary, kitchen, ingredients, cooking tips, food photography, recipe sharing, cooking community" />
    <meta name="author" content="Mostafa-SAID7" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bunzo-demo.vercel.app/" />
    <meta property="og:title" content="Bunzo - Modern Recipe Platform | Discover Amazing Recipes" />
    <meta property="og:description" content="Discover, share, and create amazing recipes with Bunzo. A modern food recipe platform built with React, featuring beautiful imagery, detailed instructions, and a vibrant cooking community." />
    <meta property="og:image" content="https://bunzo-demo.vercel.app/bz-logo.svg" />
    <meta property="og:site_name" content="Bunzo" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://bunzo-demo.vercel.app/" />
    <meta property="twitter:title" content="Bunzo - Modern Recipe Platform | Discover Amazing Recipes" />
    <meta property="twitter:description" content="Discover, share, and create amazing recipes with Bunzo. A modern food recipe platform built with React, featuring beautiful imagery, detailed instructions, and a vibrant cooking community." />
    <meta property="twitter:image" content="https://bunzo-demo.vercel.app/bz-logo.svg" />
    
    <!-- Additional SEO -->
    <meta name="theme-color" content="#10b981" />
    <meta name="msapplication-TileColor" content="#10b981" />
    <link rel="canonical" href="https://bunzo-demo.vercel.app/" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Bunzo",
      "description": "Modern recipe platform for discovering and sharing amazing recipes",
      "url": "https://bunzo-demo.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://bunzo-demo.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Bunzo",
        "logo": {
          "@type": "ImageObject",
          "url": "https://bunzo-demo.vercel.app/bz-logo.svg"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
